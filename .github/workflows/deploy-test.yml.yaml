name: Deploy TEST

on:
  push:
    branches:
      - develop

jobs:
  # ─── 1. Edge Functions ────────────────────────────────
  edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy Edge Functions to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "supabase/volumes/functions/"
          target: "/data/coolify/services/fwss10fwbxvszdflkag7wmpl/volumes/functions/"
          strip_components: 3

      - name: Restart Edge Functions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker restart supabase-edge-functions-fwss10fwbxvszdflkag7wmpl
            sleep 5
            docker ps | grep edge-functions

  # ─── 2. DB Migrations ─────────────────────────────────
  migrations:
    name: DB Migrations
    runs-on: ubuntu-latest
    needs: edge-functions
    steps:
      - uses: actions/checkout@v4

      - name: Copy Migrations to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "supabase/migrations/*.sql"
          target: "/tmp/chuchipirat-migrations/"
          strip_components: 2

      - name: Run Migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for f in $(ls /tmp/chuchipirat-migrations/*.sql | sort); do
              echo "Running migration: $f"
              docker exec -i supabase-db-fwss10fwbxvszdflkag7wmpl \
                psql -U postgres -d postgres \
                -v ON_ERROR_STOP=1 \
                < "$f"
            done
            rm -rf /tmp/chuchipirat-migrations/

  # ─── 3. App Deploy ────────────────────────────────────
  app:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: migrations
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /data/coolify/applications/ow76qijbdnxr4urlvp4xeal4
            docker compose pull
            docker compose up -d --force-recreate
