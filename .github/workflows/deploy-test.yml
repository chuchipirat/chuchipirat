name: Deploy TEST

on:
  push:
    branches:
      - develop

jobs:
  # ─── 1. DB Migrations ─────────────────────────────────
  migrations:
    name: DB Migrations
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Copy Migrations to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "supabase/migrations/*.sql"
          target: "/tmp/chuchipirat-migrations/"
          strip_components: 2

      - name: Run Migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Internal Schema und Tracking-Tabelle erstellen (idempotent)
            docker exec -i supabase-db-test \
              psql -U supabase_admin -d postgres -c "
                CREATE SCHEMA IF NOT EXISTS internal;
                CREATE TABLE IF NOT EXISTS internal.schema_migrations (
                  filename TEXT PRIMARY KEY,
                  applied_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
                );"
            for f in $(ls /tmp/chuchipirat-migrations/*.sql | sort); do
              fname=$(basename "$f")
              # Migration überspringen wenn bereits angewendet
              already=$(docker exec -i supabase-db-test \
                psql -U supabase_admin -d postgres -t -A -c \
                "SELECT 1 FROM internal.schema_migrations WHERE filename = '$fname';")
              if [ "$already" = "1" ]; then
                echo "Skipping (already applied): $fname"
                continue
              fi
              echo "Running migration: $fname"
              docker exec -i supabase-db-test \
                psql -U supabase_admin -d postgres \
                -v ON_ERROR_STOP=1 \
                < "$f"
              # Migration als angewendet markieren
              docker exec -i supabase-db-test \
                psql -U supabase_admin -d postgres -c \
                "INSERT INTO internal.schema_migrations (filename) VALUES ('$fname');"
              echo "Applied: $fname"
            done
            rm -rf /tmp/chuchipirat-migrations/

  # ─── 2. Edge Functions ────────────────────────────────
  edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrations
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Copy Edge Functions to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "supabase/volumes/functions/"
          target: "/opt/chuchipirat/test/supabase/volumes/functions/"
          strip_components: 3

      - name: Restart Edge Functions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker restart supabase-edge-functions-test
            sleep 5
            docker ps | grep edge-functions

  # ─── 3. Auth Email Templates ──────────────────────────
  auth-templates:
    name: Deploy Auth Email Templates
    runs-on: ubuntu-latest
    environment: test
    needs: migrations
    steps:
      - uses: actions/checkout@v4

      - name: Copy Auth Templates to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "supabase/volumes/auth/templates/"
          target: "/opt/chuchipirat/test/supabase/volumes/auth/templates/"
          strip_components: 4

      - name: Verify Templates Deployed
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ls -la /opt/chuchipirat/test/supabase/volumes/auth/templates/

  # ─── 4. Build React App ───────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest
    needs: [edge-functions, auth-templates]
    environment: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # ── Environment Variables (vars) ──────────────
          VITE_ENVIRONMENT: ${{ vars.VITE_ENVIRONMENT }}
          VITE_UMAMI_HOST: ${{ vars.VITE_UMAMI_HOST }}

          # ── Environment Secrets ───────────────────────
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_CONFIRMATION_EMAIL_REDIRECT: ${{ secrets.VITE_CONFIRMATION_EMAIL_REDIRECT }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_UMAMI_WEBSITE_ID: ${{ secrets.VITE_UMAMI_WEBSITE_ID }}
          VITE_SUPPORT_USER_ID: ${{ secrets.VITE_SUPPORT_USER_ID }}

          # ── Sentry Build (Source Maps + Bundle Size) ──
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/"
          target: "/opt/chuchipirat/test/app/html/"
          strip_components: 1
