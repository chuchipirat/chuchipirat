name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ─── 1. Quellbranch validieren ────────────────────────
  validate-branch:
    name: Validate source branch
    runs-on: ubuntu-latest
    steps:
      - name: Nur develop → main erlaubt
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "❌ PRs to main are only allowed from the develop branch (got: ${{ github.head_ref }})"
            exit 1
          fi
          echo "✅ Source branch is develop"

  # ─── 2. TypeScript Typecheck ──────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

  # ─── 3. ESLint ────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ─── 4. Tests ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage
