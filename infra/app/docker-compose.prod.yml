services:
  app:
    image: nginx:alpine
    container_name: chuchipirat-app-prod
    restart: unless-stopped
    ports:
      - "3011:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - chuchipirat-prod

networks:
  chuchipirat-prod:
    external: true
